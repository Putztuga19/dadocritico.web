<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mestres — Dado Crítico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #a374e8;
      --accent-dim:  rgba(163,116,232,0.12);
      --accent-glow: rgba(163,116,232,0.3);
      --accent-dark: #8459cc;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 1rem;
      overflow-y: auto;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(163,116,232,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 90%, rgba(163,116,232,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s ease both;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .auth-logo img { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 0 12px rgba(163,116,232,0.4)); }
    .auth-logo span {
      font-family: var(--font-h);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid rgba(163,116,232,0.2);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 0 40px rgba(163,116,232,0.05), 0 20px 60px rgba(0,0,0,0.4);
    }

    .auth-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin: 0 auto 1.8rem;
      padding: 0.4rem 1rem;
      background: var(--accent-dim);
      border: 1px solid rgba(163,116,232,0.3);
      border-radius: 99px;
      font-family: var(--font-h);
      font-size: 0.67rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      width: fit-content;
    }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      font-family: var(--font-h);
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--white);
      font-family: var(--font-b);
      font-size: 1rem;
      transition: border-color var(--ease), box-shadow var(--ease);
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .form-group input::placeholder { color: #555560; }

    .input-eye { position: relative; }
    .input-eye input { padding-right: 2.8rem; }
    .eye-btn {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.9rem; transition: color var(--ease);
    }
    .eye-btn:hover { color: var(--accent); }

    .hint { font-size: 0.79rem; color: var(--muted); margin-top: 0.25rem; display: block; }

    .btn-mestre {
      width: 100%; padding: 0.85rem; font-size: 1rem; margin-top: 0.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius); font-family: var(--font-h);
      font-size: 0.8rem; letter-spacing: 0.1em; font-weight: 700;
      text-transform: uppercase; cursor: pointer;
      transition: background var(--ease), transform var(--ease), box-shadow var(--ease);
    }
    .btn-mestre:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }
    .btn-mestre:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .err { display: block; font-size: 0.8rem; color: var(--red); min-height: 1rem; margin-top: 0.3rem; }
    .err-global {
      display: none; width: 100%; padding: 0.7rem 1rem;
      background: rgba(221,30,42,0.1); border: 1px solid rgba(221,30,42,0.3);
      border-radius: var(--radius); color: var(--red); font-size: 0.88rem;
      text-align: center; margin-bottom: 1rem;
    }
    .err-global.show { display: block; }

    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
    }
    .shake { animation: shake 0.4s ease; }

    /* Primeiro acesso */
    #trocarSenhaArea { display: none; }
    #trocarSenhaArea.show { display: block; }

    .auth-ok { text-align: center; padding: 1rem 0; display: none; }
    .auth-ok.show { display: block; animation: fadeUp 0.4s ease; }
    .auth-ok i { font-size: 2.5rem; color: var(--accent); margin-bottom: 1rem; display: block; }
    .auth-ok h3 { font-family: var(--font-h); font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--accent); }
    .auth-ok p { color: var(--muted); font-size: 0.9rem; }

    .auth-back { text-align: center; margin-top: 1.2rem; font-size: 0.85rem; color: var(--muted); }
    .auth-back a { color: var(--accent); text-decoration: none; }

    .divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 0.5rem 0 1.2rem;
      color: var(--muted); font-size: 0.75rem; font-family: var(--font-h);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(163,116,232,0.2), transparent);
    }

    .badge-primeiro {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      margin: 0 auto 1.2rem; padding: 0.4rem 1rem;
      background: var(--accent-dim); border: 1px solid rgba(163,116,232,0.3);
      border-radius: 99px; font-family: var(--font-h); font-size: 0.67rem;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent);
      width: fit-content;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <img src="logo.png" alt="Dado Crítico" />
      <span>Dado Crítico</span>
    </div>

    <div class="auth-card" id="authCard">

      <!-- LOGIN -->
      <div id="loginArea">
        <div class="auth-badge"><i class="fas fa-hat-wizard"></i> Área dos Mestres</div>
        <div class="divider">Acesso dos narradores</div>
        <div class="err-global" id="errGlobal"></div>

        <div class="form-group">
          <label for="inputCredencial">Credencial</label>
          <input type="text" id="inputCredencial" placeholder="Ex: DC-MT-001" autocomplete="off" spellcheck="false" style="text-transform:uppercase;" />
          <span class="hint">Formato: DC-MT-000</span>
          <span class="err" id="err-credencial"></span>
        </div>

        <div class="form-group">
          <label for="inputSenha">Senha</label>
          <div class="input-eye">
            <input type="password" id="inputSenha" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="eye-btn" id="btnOlho"><i class="fas fa-eye"></i></button>
          </div>
          <span class="err" id="err-senha"></span>
        </div>

        <button class="btn-mestre" id="btnEntrar">
          <i class="fas fa-book-open"></i><span>Entrar como Mestre</span>
        </button>
      </div>

      <!-- PRIMEIRO ACESSO -->
      <div id="trocarSenhaArea">
        <div class="badge-primeiro"><i class="fas fa-key"></i> Primeiro Acesso</div>
        <p style="color:var(--muted);font-size:0.9rem;margin-bottom:1.5rem;line-height:1.6;">
          Bem-vindo(a), Mestre! Define uma senha pessoal antes de continuar.
        </p>
        <div class="err-global" id="errTrocar"></div>

        <div class="form-group">
          <label for="novaSenha">Nova Senha</label>
          <div class="input-eye">
            <input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres" />
            <button type="button" class="eye-btn" id="btnOlhoNova"><i class="fas fa-eye"></i></button>
          </div>
          <span class="err" id="err-novaSenha"></span>
          <span class="hint">Mínimo 6 caracteres.</span>
        </div>

        <div class="form-group">
          <label for="confirmarSenha">Confirmar Senha</label>
          <div class="input-eye">
            <input type="password" id="confirmarSenha" placeholder="Repete a senha" />
            <button type="button" class="eye-btn" id="btnOlhoConfirmar"><i class="fas fa-eye"></i></button>
          </div>
          <span class="err" id="err-confirmarSenha"></span>
        </div>

        <button class="btn-mestre" id="btnTrocar">
          <i class="fas fa-check"></i><span>Definir Senha e Entrar</span>
        </button>
      </div>

      <!-- SUCESSO -->
      <div class="auth-ok" id="authOk">
        <i class="fas fa-hat-wizard"></i>
        <h3 id="authOkTitle">Bem-vindo(a), Mestre!</h3>
        <p id="authOkMsg">A carregar o teu painel...</p>
      </div>

    </div>
    <div class="auth-back">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Voltar à área principal</a>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection, query, where, getDocs,
      doc, updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    async function hashSenha(senha) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(senha));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function setSession(data) { sessionStorage.setItem('dc_session', JSON.stringify(data)); }
    function setErr(id, msg) { const el = document.getElementById('err-'+id); if(el) el.textContent = msg; }
    function clearErrs() {
      document.querySelectorAll('.err').forEach(e => e.textContent='');
      document.getElementById('errGlobal').classList.remove('show');
    }
    function showGlobalErr(msg) {
      const el = document.getElementById('errGlobal');
      el.textContent = msg; el.classList.add('show');
      const card = document.getElementById('authCard');
      card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
    }
    function showOk(title, msg) {
      document.getElementById('loginArea').style.display = 'none';
      document.getElementById('trocarSenhaArea').classList.remove('show');
      document.getElementById('authOkTitle').textContent = title;
      document.getElementById('authOkMsg').textContent   = msg;
      document.getElementById('authOk').classList.add('show');
    }
    function toggleOlho(inputId, btnId) {
      const input = document.getElementById(inputId);
      const vis   = input.type === 'password';
      input.type  = vis ? 'text' : 'password';
      document.getElementById(btnId).querySelector('i').className = vis ? 'fas fa-eye-slash' : 'fas fa-eye';
    }

    let _uid = null, _role = null, _nome = null;

    async function doLogin() {
      clearErrs();
      const credencial = document.getElementById('inputCredencial').value.trim().toUpperCase();
      const senha      = document.getElementById('inputSenha').value;
      const mesa = null; // campo removido
      let ok = true;

      if (!credencial) { setErr('credencial', 'Insere a tua credencial.'); ok = false; }
      if (!senha)      { setErr('senha', 'Insere a tua senha.'); ok = false; }
      if (!ok) return;

      const btn = document.getElementById('btnEntrar');
      btn.disabled = true;
      btn.querySelector('span').textContent = 'A verificar...';

      try {
        const q    = query(collection(db, 'users'), where('credencial', '==', credencial));
        const snap = await getDocs(q);

        if (snap.empty) {
          showGlobalErr('Aventureiro desconhecido... Credencial não encontrada.');
          btn.disabled = false; btn.querySelector('span').textContent = 'Entrar como Mestre';
          return;
        }

        const userDoc   = snap.docs[0];
        const u         = userDoc.data();
        const senhaHash = await hashSenha(senha);

        if (u.senhaHash !== senhaHash) {
          showGlobalErr('Senha incorreta. Tenta novamente.');
          btn.disabled = false; btn.querySelector('span').textContent = 'Entrar como Mestre';
          return;
        }

        if (u.role !== 'master' && u.role !== 'mestre') {
          showGlobalErr('Acesso negado. Esta área é restrita aos mestres.');
          btn.disabled = false; btn.querySelector('span').textContent = 'Entrar como Mestre';
          return;
        }

        _uid  = userDoc.id;
        _role = u.role;
        _nome = u.nome;

        const sessionData = { uid: _uid, credencial: u.credencial, nome: _nome, role: _role, apelido: u.apelido || '' };
        if (mesa) sessionData.mesaAtiva = mesa;
        setSession(sessionData);

        if (u.primeiroAcesso) {
          document.getElementById('loginArea').style.display = 'none';
          document.getElementById('trocarSenhaArea').classList.add('show');
          btn.disabled = false; btn.querySelector('span').textContent = 'Entrar como Mestre';
          return;
        }

        const exibicao = u.apelido || _nome.split(' ')[0];
        showOk('Bem-vindo(a), Mestre ' + exibicao + '!', 'A carregar o teu painel...');
        setTimeout(() => { window.location.href = 'mestre.html'; }, 1300);

      } catch (err) {
        console.error(err);
        showGlobalErr('Erro de ligação. Tenta novamente.');
        btn.disabled = false; btn.querySelector('span').textContent = 'Entrar como Mestre';
      }
    }

    async function doTrocarSenha() {
      const nova      = document.getElementById('novaSenha').value;
      const confirmar = document.getElementById('confirmarSenha').value;
      let ok = true;

      setErr('novaSenha',''); setErr('confirmarSenha','');
      document.getElementById('errTrocar').classList.remove('show');

      if (nova.length < 6)    { setErr('novaSenha', 'Mínimo 6 caracteres.'); ok = false; }
      if (nova !== confirmar) { setErr('confirmarSenha', 'As senhas não coincidem.'); ok = false; }
      if (!ok) return;

      const btn = document.getElementById('btnTrocar');
      btn.disabled = true; btn.querySelector('span').textContent = 'A guardar...';

      try {
        const senhaHash = await hashSenha(nova);
        await updateDoc(doc(db, 'users', _uid), { senhaHash, primeiroAcesso: false });
        showOk('Senha definida! Bem-vindo(a), Mestre ' + _nome.split(' ')[0] + '!', 'A carregar o teu painel...');
        setTimeout(() => { window.location.href = 'mestre.html'; }, 1300);
      } catch (err) {
        console.error(err);
        const errEl = document.getElementById('errTrocar');
        errEl.textContent = 'Erro ao guardar. Tenta novamente.';
        errEl.classList.add('show');
        btn.disabled = false; btn.querySelector('span').textContent = 'Definir Senha e Entrar';
      }
    }

    document.getElementById('btnEntrar').addEventListener('click', doLogin);
    document.getElementById('btnTrocar').addEventListener('click', doTrocarSenha);
    document.getElementById('btnOlho').addEventListener('click', () => toggleOlho('inputSenha','btnOlho'));
    document.getElementById('btnOlhoNova').addEventListener('click', () => toggleOlho('novaSenha','btnOlhoNova'));
    document.getElementById('btnOlhoConfirmar').addEventListener('click', () => toggleOlho('confirmarSenha','btnOlhoConfirmar'));

    document.getElementById('inputCredencial').addEventListener('input', function() {
      const pos = this.selectionStart;
      const antes = this.value;
      const depois = antes.toUpperCase().replace(/ /g, '-');
      if (antes !== depois) { this.value = depois; this.setSelectionRange(pos, pos); }
    });



    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('trocarSenhaArea').classList.contains('show')) doTrocarSenha();
      else doLogin();
    });
  </script>
</body>
</html>

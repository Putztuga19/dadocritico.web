<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <title>Coordenação — Dado Crítico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:       #c9a84c;
      --accent-dim:   rgba(201,168,76,0.15);
      --accent-glow:  rgba(201,168,76,0.3);
      --accent-dark:  #a8863a;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 1rem;
      overflow-y: auto;
    }

    /* Fundo decorativo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .auth-wrap {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s ease both;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .auth-logo img { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 0 12px rgba(201,168,76,0.4)); }
    .auth-logo span {
      font-family: var(--font-h);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 0 40px rgba(201,168,76,0.05), 0 20px 60px rgba(0,0,0,0.4);
    }

    .auth-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin: 0 auto 1.8rem;
      padding: 0.4rem 1rem;
      background: var(--accent-dim);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 99px;
      font-family: var(--font-h);
      font-size: 0.67rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      width: fit-content;
    }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      font-family: var(--font-h);
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--white);
      font-family: var(--font-b);
      font-size: 1rem;
      transition: border-color var(--ease), box-shadow var(--ease);
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .form-group input::placeholder { color: #555560; }

    .input-eye { position: relative; }
    .input-eye input { padding-right: 2.8rem; }
    .eye-btn {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 0.9rem; transition: color var(--ease);
    }
    .eye-btn:hover { color: var(--accent); }

    .btn-coord {
      width: 100%; padding: 0.85rem; font-size: 1rem; margin-top: 0.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      background: var(--accent); color: #1c1c20; border: none;
      border-radius: var(--radius); font-family: var(--font-h);
      font-size: 0.8rem; letter-spacing: 0.1em; font-weight: 700;
      text-transform: uppercase; cursor: pointer;
      transition: background var(--ease), transform var(--ease), box-shadow var(--ease);
    }
    .btn-coord:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }
    .btn-coord:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .err { display: block; font-size: 0.8rem; color: var(--red); min-height: 1rem; margin-top: 0.3rem; }
    .err-global {
      display: none; width: 100%; padding: 0.7rem 1rem;
      background: rgba(221,30,42,0.1); border: 1px solid rgba(221,30,42,0.3);
      border-radius: var(--radius); color: var(--red); font-size: 0.88rem;
      text-align: center; margin-bottom: 1rem;
    }
    .err-global.show { display: block; }

    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
    }
    .shake { animation: shake 0.4s ease; }

    .auth-ok { text-align: center; padding: 1rem 0; display: none; }
    .auth-ok.show { display: block; animation: fadeUp 0.4s ease; }
    .auth-ok i { font-size: 2.5rem; color: var(--accent); margin-bottom: 1rem; display: block; }
    .auth-ok h3 { font-family: var(--font-h); font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--accent); }
    .auth-ok p { color: var(--muted); font-size: 0.9rem; }

    .auth-back { text-align: center; margin-top: 1.2rem; font-size: 0.85rem; color: var(--muted); }
    .auth-back a { color: var(--accent); text-decoration: none; }

    .divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 0.5rem 0 1.2rem;
      color: var(--muted); font-size: 0.75rem; font-family: var(--font-h);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.2), transparent);
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <img src="logo.png" alt="Dado Crítico" />
      <span>Dado Crítico</span>
    </div>

    <div class="auth-card" id="authCard">

      <div id="loginArea">
        <div class="auth-badge"><i class="fas fa-crown"></i> Área da Coordenação</div>
        <div class="divider">Acesso restrito</div>
        <div class="err-global" id="errGlobal"></div>

        <div class="form-group">
          <label for="inputCredencial">Credencial</label>
          <input type="text" id="inputCredencial" placeholder="Ex: DC-C-001" autocomplete="off" spellcheck="false" style="text-transform:uppercase;" />
          <span class="err" id="err-credencial"></span>
        </div>

        <div class="form-group">
          <label for="inputSenha">Senha</label>
          <div class="input-eye">
            <input type="password" id="inputSenha" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="eye-btn" id="btnOlho"><i class="fas fa-eye"></i></button>
          </div>
          <span class="err" id="err-senha"></span>
        </div>

        <button class="btn-coord" id="btnEntrar">
          <i class="fas fa-shield-halved"></i><span>Entrar na Coordenação</span>
        </button>
      </div>

      <div class="auth-ok" id="authOk">
        <i class="fas fa-crown"></i>
        <h3 id="authOkTitle">Bem-vindo!</h3>
        <p id="authOkMsg">A carregar o painel...</p>
      </div>

    </div>
    <div class="auth-back">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Voltar à área principal</a>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection, query, where, getDocs,
      doc, updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    async function hashSenha(senha) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(senha));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function setSession(data) { sessionStorage.setItem('dc_session', JSON.stringify(data)); }
    function setErr(id, msg) { const el = document.getElementById('err-'+id); if(el) el.textContent = msg; }
    function clearErrs() {
      document.querySelectorAll('.err').forEach(e => e.textContent='');
      document.getElementById('errGlobal').classList.remove('show');
    }
    function showGlobalErr(msg) {
      const el = document.getElementById('errGlobal');
      el.textContent = msg; el.classList.add('show');
      const card = document.getElementById('authCard');
      card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
    }
    function showOk(title, msg) {
      document.getElementById('loginArea').style.display = 'none';
      document.getElementById('authOkTitle').textContent = title;
      document.getElementById('authOkMsg').textContent   = msg;
      document.getElementById('authOk').classList.add('show');
    }

    async function doLogin() {
      clearErrs();
      const credencial = document.getElementById('inputCredencial').value.trim().toUpperCase();
      const senha      = document.getElementById('inputSenha').value;
      let ok = true;

      if (!credencial) { setErr('credencial', 'Insere a tua credencial.'); ok = false; }
      if (!senha)      { setErr('senha', 'Insere a tua senha.'); ok = false; }
      if (!ok) return;

      const btn = document.getElementById('btnEntrar');
      btn.disabled = true;
      btn.querySelector('span').textContent = 'A verificar...';

      try {
        const q    = query(collection(db, 'users'), where('credencial', '==', credencial));
        const snap = await getDocs(q);

        if (snap.empty) {
          showGlobalErr('Credencial não encontrada.');
          btn.disabled = false; btn.querySelector('span').textContent = 'Entrar na Coordenação';
          return;
        }

        const userDoc   = snap.docs[0];
        const u         = userDoc.data();
        const senhaHash = await hashSenha(senha);

        if (u.senhaHash !== senhaHash) {
          showGlobalErr('Senha incorreta.');
          btn.disabled = false; btn.querySelector('span').textContent = 'Entrar na Coordenação';
          return;
        }

        if (u.role !== 'master' && u.role !== 'coord') {
          showGlobalErr('Acesso negado. Esta área é restrita à coordenação.');
          btn.disabled = false; btn.querySelector('span').textContent = 'Entrar na Coordenação';
          return;
        }

        // Registra último acesso

        setSession({ uid: userDoc.id, credencial: u.credencial, nome: u.nome, role: u.role, apelido: u.apelido || '' });

        const exibicao = u.apelido || u.nome.split(' ')[0];
        showOk('Bem-vindo(a), ' + exibicao + '!', 'A carregar o painel da coordenação...');
        setTimeout(() => { window.location.href = 'coordenador.html'; }, 1300);

      } catch (err) {
        console.error(err);
        showGlobalErr('Erro de ligação. Tenta novamente.');
        btn.disabled = false; btn.querySelector('span').textContent = 'Entrar na Coordenação';
      }
    }

    document.getElementById('btnEntrar').addEventListener('click', doLogin);
    document.getElementById('btnOlho').addEventListener('click', () => {
      const input = document.getElementById('inputSenha');
      const vis = input.type === 'password';
      input.type = vis ? 'text' : 'password';
      document.getElementById('btnOlho').querySelector('i').className = vis ? 'fas fa-eye-slash' : 'fas fa-eye';
    });

    document.getElementById('inputCredencial').addEventListener('input', function() {
      const pos = this.selectionStart;
      const antes = this.value;
      const depois = antes.toUpperCase().replace(/ /g, '-');
      if (antes !== depois) { this.value = depois; this.setSelectionRange(pos, pos); }
    });

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
